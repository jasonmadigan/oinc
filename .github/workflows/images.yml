name: Build images

on:
  push:
    branches: [main]
    paths: [images/**, .github/workflows/images.yml]
  workflow_dispatch:
    inputs:
      version:
        description: "OCP version to build (blank = all)"
        type: string
        default: ""

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  SKIP: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "4.18"
            okd_version: "4.18.0-okd-scos.9"
            ushift_branch: "release-4.18"
            arch: amd64
          - version: "4.19"
            okd_version: "4.19.0-okd-scos.17"
            ushift_branch: "release-4.19"
            arch: amd64
          - version: "4.20"
            okd_version: "4.20.0-okd-scos.16"
            ushift_branch: "release-4.20"
            arch: amd64
          - version: "4.20"
            okd_version: "4.20.0-okd-scos.16"
            ushift_branch: "release-4.20"
            arch: arm64

    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check version filter
        if: github.event.inputs.version != '' && github.event.inputs.version != matrix.version
        run: echo "SKIP=true" >> "$GITHUB_ENV"

      - name: Checkout
        if: env.SKIP != 'true'
        uses: actions/checkout@v4

      - name: Free disk space
        if: env.SKIP != 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /usr/share/swift \
            /opt/ghc /usr/local/.ghcup /usr/local/graalvm /usr/local/share/powershell \
            /usr/local/lib/node_modules /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          sudo swapoff -a && sudo rm -f /mnt/swapfile || true
          sudo apt-get -y -qq remove '^dotnet-.*' '^llvm-.*' '^php.*' '^mongodb-.*' '^mysql-.*' \
            azure-cli google-* firefox powershell mono-devel libgl1-mesa-dri 2>/dev/null || true
          sudo apt-get -y -qq autoremove --purge
          sudo apt-get -y -qq clean

      - name: Install podman
        if: env.SKIP != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Clone upstream microshift build system
        if: env.SKIP != 'true'
        run: |
          git clone --depth 1 https://github.com/microshift-io/microshift /tmp/microshift

      - name: Patch SRPM for amd64-only versions
        if: env.SKIP != 'true' && matrix.arch == 'amd64'
        run: |
          cd /tmp/microshift
          # for amd64-only versions (4.18/4.19), arm64 OKD releases don't exist upstream.
          # patch the srpm Containerfile to only resolve the target arch.
          sed -i 's|ARCH="x86_64" "${USHIFT_PREBUILD_SCRIPT}" --replace "${OKD_RELEASE_IMAGE_X86_64}" "${OKD_VERSION_TAG}" && \\|ARCH="x86_64" "${USHIFT_PREBUILD_SCRIPT}" --replace "${OKD_RELEASE_IMAGE_X86_64}" "${OKD_VERSION_TAG}"|' packaging/srpm.Containerfile
          sed -i '/ARCH="aarch64" "${USHIFT_PREBUILD_SCRIPT}" --replace "${OKD_RELEASE_IMAGE_AARCH64}" "${OKD_VERSION_TAG}"/d' packaging/srpm.Containerfile
          sed -i 's|ARCH="x86_64" "${USHIFT_PREBUILD_SCRIPT}" --replace-kindnet "${OKD_RELEASE_IMAGE_X86_64}" "${OKD_VERSION_TAG}" && \\|ARCH="x86_64" "${USHIFT_PREBUILD_SCRIPT}" --replace-kindnet "${OKD_RELEASE_IMAGE_X86_64}" "${OKD_VERSION_TAG}"|' packaging/srpm.Containerfile
          sed -i '/ARCH="aarch64" "${USHIFT_PREBUILD_SCRIPT}" --replace-kindnet "${OKD_RELEASE_IMAGE_AARCH64}" "${OKD_VERSION_TAG}"/d' packaging/srpm.Containerfile

      - name: Patch SRPM for arm64-only builds
        if: env.SKIP != 'true' && matrix.arch == 'arm64'
        run: |
          cd /tmp/microshift
          # for arm64 builds, only resolve aarch64 images
          sed -i 's|ARCH="x86_64" "${USHIFT_PREBUILD_SCRIPT}" --replace "${OKD_RELEASE_IMAGE_X86_64}" "${OKD_VERSION_TAG}" && \\|ARCH="aarch64" "${USHIFT_PREBUILD_SCRIPT}" --replace "${OKD_RELEASE_IMAGE_AARCH64}" "${OKD_VERSION_TAG}"|' packaging/srpm.Containerfile
          sed -i '/ARCH="aarch64" "${USHIFT_PREBUILD_SCRIPT}" --replace "${OKD_RELEASE_IMAGE_AARCH64}" "${OKD_VERSION_TAG}"/d' packaging/srpm.Containerfile
          sed -i 's|ARCH="x86_64" "${USHIFT_PREBUILD_SCRIPT}" --replace-kindnet "${OKD_RELEASE_IMAGE_X86_64}" "${OKD_VERSION_TAG}" && \\|ARCH="aarch64" "${USHIFT_PREBUILD_SCRIPT}" --replace-kindnet "${OKD_RELEASE_IMAGE_AARCH64}" "${OKD_VERSION_TAG}"|' packaging/srpm.Containerfile
          sed -i '/ARCH="aarch64" "${USHIFT_PREBUILD_SCRIPT}" --replace-kindnet "${OKD_RELEASE_IMAGE_AARCH64}" "${OKD_VERSION_TAG}"/d' packaging/srpm.Containerfile

      - name: Build SRPMs
        if: env.SKIP != 'true'
        working-directory: /tmp/microshift
        run: |
          sudo podman build \
            -t microshift-okd-srpm \
            --build-arg USHIFT_GITREF="${{ matrix.ushift_branch }}" \
            --build-arg OKD_VERSION_TAG="${{ matrix.okd_version }}" \
            -f packaging/srpm.Containerfile .
        timeout-minutes: 30

      - name: Build RPMs
        if: env.SKIP != 'true'
        working-directory: /tmp/microshift
        run: |
          sudo podman build \
            -t microshift-okd-rpm \
            --ulimit nofile=524288:524288 \
            -f packaging/rpm.Containerfile .
        timeout-minutes: 30

      - name: Copy build scripts into image context
        if: env.SKIP != 'true'
        run: |
          cp /tmp/microshift/src/rpm/create_repos.sh images/
          cp /tmp/microshift/src/rpm/postinstall.sh images/
          cp /tmp/microshift/src/image/embed_images.sh images/

      - name: Build oinc image
        if: env.SKIP != 'true'
        run: |
          # arm64 OKD release references some Red Hat registry images that require auth,
          # so skip embedding for arm64 (images pulled at runtime instead)
          EMBED=1
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            EMBED=0
          fi
          sudo podman build \
            --ulimit nofile=524288:524288 \
            --env WITH_KINDNET=1 \
            --env WITH_OLM=1 \
            --env EMBED_CONTAINER_IMAGES=$EMBED \
            -t "${{ env.IMAGE_NAME }}:${{ matrix.okd_version }}-${{ matrix.arch }}" \
            -f images/Containerfile images/
        timeout-minutes: 30

      - name: Login to GHCR
        if: env.SKIP != 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push image
        if: env.SKIP != 'true'
        run: |
          for attempt in 1 2 3; do
            sudo podman push "${{ env.IMAGE_NAME }}:${{ matrix.okd_version }}-${{ matrix.arch }}" && break
            echo "push attempt ${attempt} failed, retrying in 10s..."
            sleep 10
          done
