name: E2E

on:
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        runtime: [docker, podman]
    env:
      CR: ${{ matrix.runtime }}
      # podman must be rootful for oinc, so the podman leg runs everything
      # (oinc, podman, kubectl) under sudo; 'env' is a no-op stand-in on the
      # docker leg so commands can stay quoted
      PREFIX: ${{ matrix.runtime == 'podman' && 'sudo' || 'env' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install podman
        if: matrix.runtime == 'podman'
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Vet, test, build
        run: |
          go vet ./...
          go test ./...
          make build

      - name: Create cluster
        run: '"$PREFIX" bin/oinc create --version 4.22 --runtime "$CR"'

      - name: Assert skopeo ships in the oinc image
        run: '"$PREFIX" "$CR" exec oinc sh -c "command -v skopeo"'

      - name: Reject a ref missing host-side
        run: |
          ! "$PREFIX" bin/oinc load-image localhost/oinc-e2e:absent

      - name: Build a trivial local image
        run: |
          "$PREFIX" "$CR" build -t localhost/oinc-e2e:smoke - <<'EOF'
          FROM busybox
          RUN touch /oinc-e2e-marker
          EOF

      - name: Load the image into the cluster
        run: '"$PREFIX" bin/oinc load-image localhost/oinc-e2e:smoke'

      - name: Run a pod from the loaded image
        run: |
          "$PREFIX" kubectl --context oinc run e2e-smoke \
            --image=localhost/oinc-e2e:smoke \
            --image-pull-policy=IfNotPresent \
            --restart=Never \
            --command -- sh -c 'test -f /oinc-e2e-marker && sleep 300'
          "$PREFIX" kubectl --context oinc wait pod/e2e-smoke --for=condition=Ready --timeout=180s

      - name: Re-load the same image (idempotence)
        run: '"$PREFIX" bin/oinc load-image localhost/oinc-e2e:smoke'

      - name: Dump state on failure
        if: failure()
        run: |
          "$PREFIX" "$CR" ps -a || true
          "$PREFIX" "$CR" logs oinc --tail 100 || true
          "$PREFIX" "$CR" exec oinc crictl images || true
          "$PREFIX" kubectl --context oinc get pods -A || true
          "$PREFIX" kubectl --context oinc describe pod e2e-smoke || true

  # addon instance options: portal-enabled kuadrant CR, metallb address pool,
  # default gateway. the kuadrant chain is heavy, so a single docker leg with
  # a pinned version and a generous but bounded timeout
  instances:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Create cluster with instance options
        run: |
          bin/oinc create --version 4.22 --runtime docker --addons kuadrant@latest \
            --kuadrant-devportal --metallb-address-pool auto --gateway-api-gateway

      - name: Assert the portal field persisted on the kuadrant CR
        run: |
          test "$(kubectl --context oinc -n kuadrant-system get kuadrant kuadrant \
            -o jsonpath='{.spec.components.developerPortal.enabled}')" = "true"

      - name: Assert the developer portal controller is available
        run: |
          kubectl --context oinc -n kuadrant-system wait deployment/developer-portal-controller \
            --for=condition=Available --timeout=120s

      - name: Assert the address pool and advertisement exist
        run: |
          kubectl --context oinc -n metallb-system get ipaddresspool oinc-pool
          kubectl --context oinc -n metallb-system get l2advertisement oinc-l2

      # fully qualified kind: bare "gateway" resolves to istio's
      # gateways.networking.istio.io on this cluster
      - name: Assert the gateway is programmed with an address
        run: |
          kubectl --context oinc -n gateway-system wait gateway.gateway.networking.k8s.io/kuadrant-ingressgateway \
            --for=condition=Programmed --timeout=120s
          test -n "$(kubectl --context oinc -n gateway-system get gateway.gateway.networking.k8s.io kuadrant-ingressgateway \
            -o jsonpath='{.status.addresses[0].value}')"

      - name: Assert the generated service opted in to the scoped metallb
        run: |
          test "$(kubectl --context oinc -n gateway-system get svc kuadrant-ingressgateway-istio \
            -o jsonpath='{.spec.loadBalancerClass}')" = "oinc.io/metallb"

      - name: Assert router-default kept its service-lb ingress
        run: |
          test -n "$(kubectl --context oinc -n openshift-ingress get svc router-default \
            -o jsonpath='{.status.loadBalancer.ingress}')"

      - name: Re-install addons with the same options (idempotence)
        run: |
          bin/oinc addon install kuadrant@latest \
            --kuadrant-devportal --metallb-address-pool auto --gateway-api-gateway

      - name: Dump state on failure
        if: failure()
        run: |
          docker ps -a || true
          docker logs oinc --tail 100 || true
          kubectl --context oinc get pods -A || true
          kubectl --context oinc -n kuadrant-system get kuadrant kuadrant -o yaml || true
          kubectl --context oinc -n kuadrant-system get deploy,pods || true
          kubectl --context oinc -n kuadrant-system logs deployment/kuadrant-operator-controller-manager --tail 100 --all-containers || true
          kubectl --context oinc -n metallb-system get ipaddresspool,l2advertisement -o yaml || true
          kubectl --context oinc -n gateway-system get gateway.gateway.networking.k8s.io,svc,deploy,pods -o wide || true
          kubectl --context oinc -n gateway-system get gateway.gateway.networking.k8s.io kuadrant-ingressgateway -o yaml || true

  # rhdh + postgres + microshift is memory-heavy, so this runs as its own
  # single leg (docker, pinned version) rather than in the smoke matrix
  rhdh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RHDH_URL: http://rhdh.127.0.0.1.nip.io:9080
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Create cluster with rhdh addon
        run: bin/oinc create --version 4.22 --runtime docker --addons rhdh

      - name: Wait for rhdh rollout
        run: |
          kubectl --context oinc -n rhdh rollout status deploy/rhdh-developer-hub --timeout=300s
          kubectl --context oinc -n rhdh wait pod -l app.kubernetes.io/component=backstage --for=condition=Ready --timeout=300s

      - name: Assert the Route serves the app
        run: curl -sSf --retry 10 --retry-delay 5 --retry-all-errors "$RHDH_URL" | grep -qi "Red Hat Developer Hub"

      - name: Assert guest auth responds
        run: |
          curl -sSf -H 'X-Requested-With: XMLHttpRequest' "$RHDH_URL/api/auth/guest/refresh" | grep -q '"token"'

      - name: Dump state on failure
        if: failure()
        run: |
          docker ps -a || true
          docker logs oinc --tail 100 || true
          kubectl --context oinc get pods -A || true
          kubectl --context oinc -n rhdh get deploy,pods,routes,svc || true
          kubectl --context oinc -n rhdh describe pod -l app.kubernetes.io/component=backstage || true
          kubectl --context oinc -n rhdh logs deploy/rhdh-developer-hub --all-containers --tail 100 || true
          curl -sv "$RHDH_URL" || true
